<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Great+Vibes&family=Princess+Sofia&family=Pinyon+Script&family=Parisienne&display=swap" rel="stylesheet">

    <!-- PWA 핵심 -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f4c5c" />

    <!-- 전체화면 / 상태바 숨김 (iOS + Android) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlipClock" />

    <!-- 뷰포트: 브라우저 핀치줌 완전 차단 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- iOS 아이콘 -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- 파비콘 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <title>FlipClock</title>

    <style>
      /* 전체화면 꽉 채우기 */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #0f4c5c;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        box-sizing: border-box;
      }
      /* 브라우저 길게 누르기 메뉴 / 텍스트 선택 / 핀치줌 완전 차단 */
      * {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      /* 캔버스는 touch-action none 유지 */
      canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then((reg) => console.log('✅ SW 등록:', reg.scope))
            .catch((err) => console.warn('❌ SW 실패:', err));
        });
      }
    </script>
  </body>
</html>
